assets_a_remover_antes_do_push:
  razao: >
    Estes ficheiros foram staged pelo @qa Quinn durante o gate AC-C2 para permitir
    o render de teste com dados reais do Alturense. Não pertencem à fundação
    genérica do template Remotion. Devem sair de public/ antes do push para:
    (1) manter o template Alturense-default LIMPO de identidade de cliente;
    (2) evitar que os ficheiros apareçam no próximo push do @devops.
  ficheiros:
    - path: "squad/templates/remotion/alturense-default/public/placeholder/frango-final-19-04.png"
      accao: remover ou mover
      destino_sugerido: "docs/qa/samples/frango-final-19-04.png (preservar histórico QA)"
      razao: "Foto do prato do Alturense de 19/04 — é artefacto de QA, não de template"
    - path: "squad/templates/remotion/alturense-default/public/music/altura11-proxy.mp3"
      accao: remover
      destino_sugerido: "eliminar (licença CapCut Free não é para produção)"
      razao: "Proxy sonoro extraído do CapCut — não é royalty-free validado, viola AC-B5/R9 se for comitado"
  verificacao_pos_sanitization:
    - "public/placeholder/ fica apenas com: clip-01.png, clip-01.mp4, clip-02.png, clip-02.mp4, design-final.png, test-subtitles.srt (os que o @dev gerou originalmente)"
    - "public/music/ fica apenas com: README.md (o track real ainda não está disponível; warm-background-01.mp3 é silent placeholder regenerável pelo operador)"
  nota: "O script qa-render-frango.js em docs/qa/altura11/ pode continuar versionado — é artefacto QA legítimo. O render output em squad/data/ está gitignored."

