     entrega spec de design, Pax passa a @sm.
  4. Se (B): passar directamente a @sm River com instrução de *draft da Story 1.2.
  5. Consumir este handoff (marcar consumed, mover para archive, actualizar INDEX).

estimated_effort_po: "30 min (ler contexto + decidir workflow A vs B + gerar handoff seguinte)"

