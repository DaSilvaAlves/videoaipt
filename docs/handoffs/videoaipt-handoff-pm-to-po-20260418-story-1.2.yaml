cleanup_note: >
  Esta story fecha o gap entre "fundação técnica genérica" (Story 1.1) e
  "peça publicável com identidade Alturense" (Story 1.2). É a story que
  valida R4 mitigation de forma real — @qa só pode fechar Done se qualidade
  for EQUIVALENTE OU SUPERIOR ao CapCut manual. A fundação Story 1.1 é
  reutilizável; a identidade Story 1.2 é cliente-específica. Este padrão
  é a base do modelo SaaS Fase 2 da comunidade [IA]AVANÇADA PT.
