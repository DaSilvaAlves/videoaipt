  com recomendação de stack end-to-end, breakdown de custo (€0,83-€1,35 por vídeo
  Alturense, compliance com KPI <€2), latência (3-12 min, compliance com KPI <15 min) e
  validação das assumptions Q6-Q10 do PRD §15. Aria (@architect) deve re-verificar
