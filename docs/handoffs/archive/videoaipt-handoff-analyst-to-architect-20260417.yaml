priority_questions_for_architect:
  - id: Q-ARQ-1
    question: >
      Remotion render em v1.0 deve correr (a) local na máquina do Eurico (zero custo,
      depende de máquina on) ou (b) AWS Lambda desde day 1 (custo ~€0,02/vídeo, sempre
      disponível)?
    analyst_recommendation: "Local em v1.0 (optimize time-to-first-video), migrar para Lambda quando v1.5 abrir para mentorados."
    impact: "Afecta story 1 do Passo C (setup Remotion infra) e custo operacional Fase 1"

  - id: Q-ARQ-2
    question: >
      Os vídeos Alturense actuais têm voz falada (require Whisper + post-processor PT-PT)
      ou apenas música+texto overlay (Whisper out of scope v1.0)?
    analyst_recommendation: "Confirmar com Eurico observando últimos 3-5 vídeos manuais. Se sem voz, reduz Camada 4 a <Subtitle/> Remotion."
    impact: "Se sem voz, v1.0 corta Whisper e post-processor inteiramente; se com voz, mantém stack completa."

  - id: Q-ARQ-3
    question: >
      v1.0 deve já ter interface abstrata (`VideoGeneratorProvider`, `ImageGeneratorProvider`)
      implementada para trivial swap v1.1, ou hardcode directo e refactor quando chegar?
    analyst_recommendation: "Abstraction day 1. Task-first principle já o exige. Custo marginal baixo; benefício claro para v1.1 fallbacks."
    impact: "Determina se Passo C começa com infra abstraction layer ou tasks directas sobre providers"

