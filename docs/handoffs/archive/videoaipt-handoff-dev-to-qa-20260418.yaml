  passo_2_render_remotion_equivalente: "Editar squad/data/alturense/persona/persona.yaml com mesma copy/preço/produto do vídeo CapCut, executar test-render.js"
  passo_3_comparacao_visual: "Side-by-side em ferramenta vídeo (DaVinci, CapCut viewer, ou simplesmente VLC com 2 instâncias)"
  passo_4_avaliar_6_criterios:
    - "Pacing (timing dos clips, transições)"
    - "Qualidade visual dos overlays (legibilidade, posicionamento)"
    - "Música (volume, fade in/out)"
    - "Legendas (sincronização, fonte, contraste)"
    - "Cores (paleta quente Alturense)"
    - "Tom geral (corresponde a 'Atum à Algarvia'?)"
  passo_5_documentar: "docs/qa/1.1-remotion-vs-capcut.md com veredicto PASS/FAIL por critério + nota global"

caveats_e_decisoes_tecnicas_para_revisao:
  - id: DEC-1
    item: "Imports relativos curtos em vez de @/ alias"
    contexto: "Webpack alias @ colide com @remotion/cli scoped package. Tentativas: alias config, trailing slash, NormalModuleReplacementPlugin — todas falharam."
    decisao: "Imports relativos de 1 nível em src/. AC-B8 (absolute imports) honored em intenção, não em letra."
    revisao_sugerida: "@architect valida se este compromisso é aceitável ou se há solução cleaner"
  - id: DEC-2
    item: "persona.yaml force-added ao git"
    contexto: "squad/data/* está gitignored, mas persona.yaml é configuração necessária para o template renderizar."
    decisao: "Force-add (git add -f) — runtime data fica gitignored, mas persona.yaml versionado"
    revisao_sugerida: "@architect ou @data-engineer confirma padrão para persona configs"
  - id: DEC-3
    item: "Track de música como placeholder silent"
    contexto: "AC-B5 exige música royalty-free com licença. Não foi descarregado track real para evitar commit de binário grande sem licença confirmada."
    decisao: "warm-background-01.mp3 silent placeholder + LICENCE-AUDIO.md documentado mas com campos por preencher"
    revisao_sugerida: "Eurico/operador descarrega track Uppbeat free tier real e preenche LICENCE-AUDIO.md ANTES da primeira produção"
  - id: DEC-4
    item: "Variáveis técnicas em inglês"
    contexto: "Convenção Remotion (fps, durationInFrames, frame). PT-PT mantido em comentários, docstrings, nomes de variáveis novas (escala, opacidade, paleta, corDeFundo, paddingBottom)."
    decisao: "Híbrido pragmático — convenção técnica vs PT-PT preferência"
    revisao_sugerida: "@qa valida se compromisso aceitável face a AC-C3"

