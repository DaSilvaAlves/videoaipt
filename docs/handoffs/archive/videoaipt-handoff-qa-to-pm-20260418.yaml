summary: >
  Gate AC-C2 da Story 1.1 FALHOU por gap de requisitos (não de implementação).
  Eurico entregou baseline CapCut real (altura11.mp4 — "Especial de Sábado —
  Carapaus Fritos"). Render Remotion equivalente executado e frames extraídos.
  Comparação revela que o workflow real do Alturense produz peças "cartaz
  digital" com 4 componentes visuais permanentes (moldura azulejos + header
  textual + card carimbo + footer laranja Take-Away) que a Story 1.1 não
  menciona. Implementação @dev é fiel ao scope escrito — FAIL não volta a
  @dev. Morgan decide entre 2 opções: expandir Story 1.1 (Opção 1) ou fechar
  1.1 como fundação + abrir Story 1.2 para sistema visual Alturense (Opção 2).
  Recomendação @qa: Opção 2.

