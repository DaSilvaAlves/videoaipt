gap_de_requisitos_identificado:
  componentes_ausentes:
    - id: C1
      nome: AlturenseFrame
      descricao: "Moldura decorativa — padrão azulejos portugueses (azul/branco) lado esquerdo + sprig oliveira lado direito. Presente permanentemente em todos os frames do vídeo CapCut."
    - id: C2
      nome: AlturenseHeader
      descricao: "Header textual permanente com 2 linhas centradas no topo: título ('ESPECIAL DE SÁBADO' ou equivalente para prato do dia) + subtítulo itálico '(à moda do Altura)'. Font serif. Sempre visível."
    - id: C3
      nome: AlturenseCard
      descricao: "Card carimbo / selo central sobre o produto com o nome da refeição em caixa alta sans-serif (ex: 'CARAPAUS FRITOS'). Estilo sticker permanente — não animação spring de entrada."
    - id: C4
      nome: AlturenseFooter
      descricao: "Faixa laranja sólida no rodapé: 'Take-Away · Snack Bar Alturense · Altura'. Permanente."
  achado_tecnico_adicional:
    - id: TECH-1
      detalhe: "AlturenseCompositionProps.price é obrigatório (tipo string). Baseline CapCut real do Alturense NÃO mostra preço. Corrigir: price?: string + FinalScene render condicional do PriceBadge."
  formato_observado:
    capcut: "572×480 (~6:5 ou ~1.19:1) — formato nativo CapCut Free, não 1:1"
    remotion: "1080×1080 (1:1 conforme PRD §11.1)"
    observacao: "Remotion está alinhado com PRD Facebook 1:1. CapCut não está. Decisão Morgan: manter 1:1 como obrigação (PRD) ou flexibilizar para reproduzir o workflow actual do Eurico."

decisao_a_tomar:
  opcao_1:
    nome: "Expansão de scope da Story 1.1"
    como: >
      @po Pax adiciona Grupo D de AC à Story 1.1 (AC-D1 AlturenseFrame,
      AC-D2 AlturenseHeader, AC-D3 AlturenseCard, AC-D4 AlturenseFooter,
      AC-D5 price?: string opcional). Story 1.1 volta a @dev para
      implementar Grupo D (reaproveita Grupos A e B intactos). Re-gate
      completo @qa.
    pros:
      - "História linear — Story 1.1 só fecha quando cliente valida"
      - "Um único commit final para 'primeira peça funcional'"
    contras:
      - "Os 3 commits atómicos já feitos (97f38b3, 309f577, 0105b55) ficam sem push até re-gate"
      - "@dev re-entra em contexto depois de já ter 'fechado' mentalmente a story"
      - "Risco de mais iterações se Grupo D também tiver gaps"
  opcao_2:
    nome: "Fechar Story 1.1 como fundação + abrir Story 1.2"
    como: >
      Story 1.1 transita InReview → Done com redefinição de título para
      'Fundação Q-ARQ-3 + template base genérico'. @devops faz push dos
      3 commits. @po + @pm criam Story 1.2 'Sistema visual Alturense —
      AlturenseFrame/Header/Card/Footer + price opcional + follow-ups
      técnicos (DEC-1 alias, DEC-2 .gitignore)'.
    pros:
      - "Fundação arquitectural (Q-ARQ-3, EditingProvider, pipeline render, PT-PT, docs) fica imediatamente disponível no repo"
      - "Não penaliza @dev que cumpriu literalmente os AC escritos"
      - "Isola concerns 'fundação técnica' vs 'identidade visual de cliente'"
      - "Fundação reutilizável por outros clientes futuros (não herdam identidade Alturense)"
      - "Story 1.2 é um novo ciclo limpo com AC próprios e focados"
    contras:
      - "Quebra a narrativa 'Story 1.1 = 1ª peça funcional'. O título desvia para 'fundação'."
      - "Requer transparência: Story 1.1 Done ≠ primeira produção publicável. Só após Story 1.2 é que há peça realmente publicável."
  recomendacao_qa: opcao_2

