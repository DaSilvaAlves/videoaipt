acceptance_criteria_hints:
  descricao: >
    Sugestões de alto nível para o @sm refinar no template da story.
    NÃO são AC finais — o @sm escreve os AC definitivos seguindo o
    template AIOX de story e depois valida com @po.
  hints:
    - "Template Remotion inicial em `squad/templates/remotion/alturense-default/` com composition 20-30s, 1:1, 30fps, H.264"
    - "Composition aceita 2 clips de vídeo IA (tipicamente 10s cada) vindos de Camada 1 via EditingProvider input"
    - "Overlays de texto configuráveis a partir de `text-overlays.yaml` (produzido pelo script-writer Reel)"
    - "Legendas queimadas via `<Subtitle/>` lidas de `script.md` (stub text-from-script)"
    - "Faixa de música royalty-free sobreposta (biblioteca Uppbeat/Artlist/Epidemic Sound — documentar licença)"
    - "Transição fade 0.5s entre clips"
    - "EditingProvider interface implementada como `remotion-local` (consumir contrato da Aria, não hardcoded)"
    - "Render local via Node + headless Chromium + FFmpeg encode H.264"
    - "Output em `squad/data/alturense/videos/{YYYY-MM-DD}/final.mp4`"
    - "Paleta de cores quente derivada da persona Alturense (café/dourado/verde-oliva)"
    - "Comparação lado-a-lado contra output CapCut manual actual (1 vídeo real Alturense) é critério de QA — @qa gate só fecha se qualidade editorial for equivalente ou superior"
    - "Documentação inline no template (comentários TypeScript/TSX) suficiente para outro dev replicar"
    - "PT-PT no código, comentários, nomes de ficheiros"

