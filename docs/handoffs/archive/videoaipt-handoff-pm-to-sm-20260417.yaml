    formato: "Facebook 1:1"
    duracao_target_s: "20-30"
    cadencia: "1 video/dia"
    tom: "paletas quentes estilo Atum à Algarvia"
    elementos_obrigatorios:
      - musica sobreposta (royalty-free)
      - texto animado (overlays)
      - transições entre clips (fade 0.5s)
      - legendas queimadas (de script.md, via Remotion <Subtitle/>)
      - efeitos visuais subtis
