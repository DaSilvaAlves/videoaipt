summary: >
  PRD v1.0 APPROVED via duplo tacit_approval do Eurico. Stack ratificada,
  arquitectura Q-ARQ-1/2/3 decidida, 20 questões §15 resolvidas (Resolution
  Log). Passo C.3 arranca agora — River (@sm) cria a PRIMEIRA STORY do MVP:
  "Remotion Alturense template" — mitigação crítica R4+R20 do risk register.
  Esta story precede o workflow `daily-content-delivery` porque o template é
  dependency directa da Camada 3 (edição programática); sem template
  funcional, o pipeline end-to-end fica "pipeline de lama".

priority: HIGH

first_story_mandate:
  story_title_suggerido: "Remotion Alturense template — 1ª peça funcional"
  razao_de_ser_primeira: >
    R4 (Camada 3 Remotion não atinge qualidade CapCut no primeiro mês —
    ALTA/ALTA) e R20 (learning curve Remotion atrasa v1.0 em 1-2 semanas —
    MÉDIA/ALTA) são os dois riscos top-5 com maior probabilidade combinada.
    A arquitectura @architect identifica esta story como "mitigação crítica"
    explícita em §13.5 do PRD e em §11.1 ("deve ser primeira story do Passo
    C antes do workflow `daily-content-delivery`").
  antes_de_qualquer_outra_story: true
  workflow_daily_content_delivery_so_depois: true

context:
  project: VIDEO-AI-PT
  project_root: C:\Users\XPS\Documents\videoaipt
