      flag_hibrido: "canva_editable na persona.yaml"
    camada_3_edicao:
      primary: remotion + ffmpeg, render LOCAL
      provider_interface: EditingProvider
      implementacao_v1_0: remotion-local
    camada_4_captions:
      provider_interface: CaptionProvider
      implementacao_v1_0_stub: text-from-script (lê script.md)
      whisper_out_of_scope: true

  abstraction_layer_day_1:
    decisao: Q-ARQ-3 DAY-1
    interfaces:
      - VideoProvider
      - ImageProvider
      - EditingProvider
      - CaptionProvider (stub TextFromScriptProvider v1.0)
      - StorageProvider
    localizacao:
      contratos: squad/providers/interfaces/*.md
      implementacoes: squad/providers/implementations/{provider-id}/
    impacto_story_1: >
      A story 1 deve já consumir EditingProvider (não chamar Remotion
      directamente). A implementação `remotion-local` nasce nesta story,
      respeitando a interface documentada pela Aria.

  risk_register_top_5_pos_ratificacao:
    1: "R4 — Qualidade Remotion vs CapCut no primeiro mês (ALTA/ALTA) — MITIGADO por esta story"
    2: "R20 — Learning curve Remotion atrasa v1.0 em 1-2 semanas (MÉDIA/ALTA) — MITIGADO por esta story"
    3: "R13 — Qualidade output vs cliente final (ALTA/MÉDIA) — validado pela comparação lado-a-lado"
    4: "R1 — Dependência APIs externas (ALTA/MÉDIA) — fora do scope desta story mas Kling aparece aqui"
    5: "R9 — Direitos de música (ALTA/ALTA se não mitigado) — biblioteca royalty-free obrigatória"

