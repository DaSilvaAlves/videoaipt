priority_questions_for_sm:
  - id: Q-SM-1
    question: >
      River: escolhes template brownfield ou greenfield para esta story?
      O `squad/` já existe (foundation task-first com 5 agentes+21 tasks+2
      workflows), mas o template Remotion e os Providers interfaces são
      conteúdo novo.
    pm_opinion: >
      Brownfield. A fundação `squad/` é o terreno; a story adiciona
      componentes (`squad/templates/remotion/`, `squad/providers/interfaces/`,
      `squad/providers/implementations/remotion-local/`) sem tocar nas 21
      tasks existentes.
    impact: "Define qual template AIOX de story usar"

  - id: Q-SM-2
    question: >
      River: dividir em 2 sub-stories (A: contratos Providers + B: template
      Remotion Alturense) ou uma story única?
    pm_opinion: >
      Uma story única mas com AC claramente segmentados. Os contratos
      VideoProvider/ImageProvider/CaptionProvider/StorageProvider podem ser
      stubs (documentação + interface) nesta story, EditingProvider é
      implementação completa. Isto mantém abstraction layer como "dia-1"
      (Q-ARQ-3) sem explodir scope.
    impact: "Velocidade de @dev implementation"

  - id: Q-SM-3
    question: >
      River: como queres que a story registe a "comparação lado-a-lado
      contra CapCut" — como QA criterion explícito ou como acceptance
      criterion?
    pm_opinion: >
      AC explícito. A qualidade editorial equivalente ou superior é o
      critério de aceitação do cliente (Eurico). @qa valida; se falhar,
      story volta a @dev. Alinhado com R4 mitigation (§13.5).
    impact: "Define gate de qualidade da story"

