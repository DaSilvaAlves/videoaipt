  Quinn (@qa) executou gate da Story 1.1 "Remotion Alturense template".
  Veredicto global: BLOCKED em AC-C2 (comparação lado-a-lado vs CapCut).
  Código, providers, composition, cenas, overlays, stub-safe subtitles, PT-PT
  e render local — todos PASS. AC-B5 (música) e AC-B8 (imports) em CONCERNS
  aceitáveis. 4 decisões técnicas DEC-1..DEC-4 revistas: 3 APPROVE, 1 CONCERNS
