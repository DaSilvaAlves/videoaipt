    aspecto: "1:1 preferencial (1080×1080); outros ratios aceites se Eurico só tiver 9:16/16:9"
    duracao: "20-30s ideal; aceitável 15-45s"
    conteudo: "Prato do dia real (ex: Atum à Algarvia) com os overlays típicos do workflow CapCut (nome do prato, preço, música)"
    path_sugerido: "docs/qa/samples/capcut-alturense-{YYYY-MM-DD}.mp4"
    observacoes: >
      Se Eurico tiver múltiplos vídeos recentes, escolher 1 representativo do
      workflow padrão (prato do dia é o mais alinhado com o template Remotion).
      Se possível, enviar também os assets originais (clip1.mp4, design-final.png)
      usados nesse vídeo CapCut para @qa poder fazer render Remotion com
      exactamente os mesmos inputs.
  artefactos_opcionais:
    - ".srt ou transcrição do áudio/legendas (ajuda a validar AC-B4 no render Remotion equivalente)"
    - "Lista dos pratos/preços usados (para match exacto na persona.yaml de teste)"
    - "Track de música real (Uppbeat / Artlist / Epidemic Sound) + preenchimento dos campos pendentes de LICENCE-AUDIO.md (destrava DEC-3 CONCERNS)"

