revisao_decisoes_dec:
  DEC-1:
    item: "Imports relativos curtos em vez de @/ alias"
    verdict: APPROVE
    justificacao: >
      Tsconfig paths declarados para autocompletar IDE. Restrição externa
      imposta por scoped package `@remotion/cli`. Três tentativas de resolução
      documentadas no Debug Log (alias config, trailing slash, NormalModuleReplacementPlugin).
      AC-B8 honored em espírito.
    followup: "@architect avalia alias alternativo (`$/`, `~/`) fora do scope desta story"
  DEC-2:
    item: "persona.yaml force-added ao git"
    verdict: APPROVE
    justificacao: >
      Padrão legítimo para config estrutural dentro de pasta runtime gitignored.
      persona.yaml não é output runtime — é configuração necessária para render.
    followup: "@data-engineer refina .gitignore para ignorar apenas squad/data/*/{videos,posts,stories,calendar} e deixar persona/ versionado sem -f"
  DEC-3:
    item: "Track música como placeholder silent + LICENCE-AUDIO.md com campos pendentes"
    verdict: CONCERNS
    justificacao: >
      Decisão correcta para evitar commit de binário sem licença confirmada.
      AC-B5 em estado PARTIAL reconhecido. R9 (direitos de música) não é violado
      no estado actual.
    followup: >
      Eurico descarrega Uppbeat free tier (ou Artlist/Epidemic) + preenche
      LICENCE-AUDIO.md ANTES da primeira produção real. Sem isto, gate AC-B5
      bloqueia a primeira produção (não o Done da story técnica).
  DEC-4:
    item: "Variáveis técnicas em inglês (fps, durationInFrames, URL, Props)"
    verdict: APPROVE
    justificacao: >
      Compromisso sensato com convenções Remotion e TypeScript React.
      AC-C3 refere-se a textos VISÍVEIS — cumprido integralmente.
      Vars de lógica de negócio em PT-PT: escala, opacidade, paleta, corDeFundo,
      resolverSrc, atrasoFrames, DURACAO_CLIP1_S, TRANSICAO_FRAMES.
    followup: "Opcional: documentar convenção em CLAUDE.md ou guia de estilo"

