    - AC-A2 (EditingProvider remotion-local completo)
    - AC-A3 (4 stubs documentados)
    - AC-A4 (persona.yaml com bloco providers)
    - AC-B1 (estrutura de ficheiros)
    - AC-B2 (composition 1080×1080 30fps + TransitionSeries)
