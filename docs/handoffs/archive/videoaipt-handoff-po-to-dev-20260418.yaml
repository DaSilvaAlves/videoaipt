    detail: "AC-B5 é mitigação R9 (risco legal). Sem LICENCE-AUDIO.md documentado, story NÃO passa gate."
  - point: "Stub-safe BurnedSubtitle"
    detail: "AC-B4 — quando subtitlesSrtPath é undefined, componente renderiza nada SEM erro. Q-ARQ-2 (sem Whisper v1.0) depende disto."
  - point: "Red flags do bootstrap"
    detail: "Red flags #1, #2, #3 do CLAUDE.md são out-of-scope desta story. NÃO os resolvas aqui."
  - point: "R22 pricings [KC-2026-01]"
