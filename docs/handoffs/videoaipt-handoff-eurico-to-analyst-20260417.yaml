    @analyst (Alex), arranca Passo B. Não precisas de validar as 20 questões do PRD — o
    Eurico deu aprovação tácita. Em vez disso, produz research que dá factos para o
    @architect decidir a stack. Prioriza camada 3 (edição programática) — é a mais cara
    de reverter depois.
  suggested_first_commands:
    - "@analyst *help"
    - "ler HANDOFF-BOOTSTRAP.md secção 4 (candidatos iniciais por camada)"
    - "ler PRD.md v0.9 secção 13 (risk register) para entender o que mitigar"
    - "ler CLAUDE.md para mental model"
    - "*research stack-video-camada-1"
  estimated_effort: 2-4h (paralelizável por camada)

after_analyst_completes:
  next_in_pipeline: "@architect (Aria) — decisão final de stack baseada no research + update da secção 8 do PRD"
  then: "@pm (Morgan) promove PRD para v1.0 integrando research + decisão arquitectural + mitigações"
  then: "@sm (River) cria primeira story do Passo C (adaptação do squad + implementação MVP v1.0)"

