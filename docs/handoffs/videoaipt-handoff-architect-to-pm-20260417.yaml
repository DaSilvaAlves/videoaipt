priority_questions_for_pm:
  - id: Q-PM-1
    question: >
      Morgan: aceitas que o Passo C arranque com story "Remotion Alturense template"
      em vez do workflow daily-content-delivery? O research + minha análise
      indicam R4 e R20 como top-2 riscos — sem template funcional antes do
      pipeline, o produto v1.0 risca underwhelming no primeiro mês.
    architect_opinion: "sim, obrigatório. Workflow end-to-end sem template = pipeline de lama."
    impact: "Define ordem das stories do Passo C"

  - id: Q-PM-2
    question: >
      Morgan: as 20 questões de §15 devem ser validadas em batch (sessão única
      30-45min com Eurico) ou faseadas por grupo (personas → journeys →
      monetização → scope → KPIs → riscos)?
    architect_opinion: "batch único para fechar PRD v1.0 de uma vez; algumas questões são bloqueadores mútuos"
    impact: "Velocidade de promoção PRD v1.0"

  - id: Q-PM-3
    question: >
      Morgan: aceitas a nota explícita de que pricings [KC-2026-01] precisam
      re-verificação antes de primeiro billing produtivo? Ou preferes escalar
      isso como bloqueador de v1.0 (exigir @devops re-verificar AGORA)?
    architect_opinion: "absorvível para v1.0 MVP (flutuação ±20% não muda viabilidade); escalar como R22 no register e agendar re-verify em task separada antes de billing real"
    impact: "Duração até arrancar implementação"

